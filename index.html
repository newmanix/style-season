<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Eddie Browser Seasonal Wear</title>

  <!-- Default stylesheet (ONLY ONE) -->
  <link id="seasonStyle" rel="stylesheet" href="css/default.css">
</head>

<body>

  <h1>Eddie Browser Outfitters</h1>
   <h2 id="seasonText">Welcome to Eddie Browser!</h2>

  <div class=""container">
  <p>
    This page uses JavaScript to dynamically change the season. When a button is clicked,
    the page updates the stylesheet (colors), logo image, clothing image, and text
    to match the selected season. The Default button restores the original page.
  </p>

  <!-- Buttons -->
  <button onclick="setSeason('default')">Default</button>
  <button onclick="setSeason('spring')">Spring</button>
  <button onclick="setSeason('summer')">Summer</button>
  <button onclick="setSeason('fall')">Fall</button>
  <button onclick="setSeason('winter')">Winter</button>


  <img id="logo" src="https://i.pinimg.com/originals/79/63/fd/7963fd68329cfc8704725e2a26f7cf09.gif" width="150" alt="Season logo">


  <img id="clothing" src="https://www.collegefashionista.com/wp-content/uploads/2018/07/affordable-clothing-stores.jpg?resize=1080%2C600" width="200" alt="Clothing item">
</div>
 
  <script src="js/main.js"></script>

</body>
</html>
